- name: Set up Frontend configuration
  hosts: frontend
  become: yes
  tasks:
  - name: Installing Nginx Server
    ansible.builtin.package:
      name: nginx 
      state: present
  
  - name: Set up Service 
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes
  
  # - name: Install Nginx
  #   ansible.builtin.dnf:
  #     name: nginx
  #     state: present

  # - name: Remove existing frontend content
  #   ansible.builtin.shell: |
  #     rm -rf /usr/share/nginx/html/*
    
  # - name: Remove existing frontend content
  #   ansible.builtin.shell: rm -rf /usr/share/nginx/html/*
    

  - name: Remove old content
    ansible.builtin.shell: rm -rf /usr/share/nginx/html/*

  - name: Download frontend zip
    ansible.builtin.get_url:
      url: https://expense-joindevops.s3.us-east-1.amazonaws.com/expense-frontend-v2.zip
      dest: /tmp/frontend.zip

  - name: Extract frontend code
    ansible.builtin.unarchive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html
      remote_src: yes

  - name: Copy nginx config
    ansible.builtin.template:
      src: expense.conf
      dest: /etc/nginx/default.d/expense.conf



  - name: Start Nginx
    ansible.builtin.service:
      name: nginx
      state: restarted
      enabled: yes

  - name: daemon reload enable and start
    ansible.builtin.systemd_service:
      name: nginx
      enabled: true
      state: started
      daemon_reload: true

# for checking status netstat -lntp and curl http://frontend.dsoaws.fun:8080/health